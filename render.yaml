services:
  # AI Engine (Python Flask)
  - type: web
    name: mediconnect-ai
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    rootDir: "backend/ml_service"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Main Backend API (Node.js)
  - type: web
    name: mediconnect-api
    runtime: node
    buildCommand: "npm install"
    startCommand: "npm start"
    rootDir: "backend"
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: "mediconnect_super_secret_buildathon_key_2024"
      - key: DEMO_MODE
        value: "true"
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: mediconnect-ai
          property: hostport
