services:
  # AI Engine (Python Flask)
  - type: web
    name: mediconnect-ai
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    rootDir: "backend/ml_service"
    plan: free
    envVars:
      - key: PORT
        value: 10000

  # Main Backend API (Node.js)
  - type: web
    name: mediconnect-api
    runtime: node
    buildCommand: "npm install"
    startCommand: "npm start"
    rootDir: "backend"
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromContext: MONGO_URI # You'll set this once in Render
      - key: JWT_SECRET
        value: "mediconnect_super_secret_buildathon_key_2024"
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: mediconnect-ai
          property: host
